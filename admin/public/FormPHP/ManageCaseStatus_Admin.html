<div class="container-fluid" id="CaseStatusList">
     <div class="row">
          <div class="col-xl-12 col-lg-12">
               <div class="card shadow mb-12">
                    <!-- Card Header - Dropdown -->
                    <div class="form-group row">
                         <div class="col-sm-10 mt-2"></div>

                         <div class="col-sm-2 mt-2" >
                              <input class="btn btn-lg btn-success btn-block center" id="ButtonAdd"
                                   value="เพิ่ม สถานะเคส" readonly="">
                         </div>
                         
                    </div>
                    
                    <div class="card-header py-3 flex-row align-items-center justify-content-between">
                         <h3 class="m-0 font-weight-bold text-primary center">รายการ สถานะเคส</h3>
                    </div>

                    <div class="form-group row m-1">
                         <div class="col-sm-12">
                              <!-- <span class="text-info"> UG-Types </span> -->
                              <div class="form-control" id="CaseStatus"></div>
                         </div>
                    </div>                    
               </div>
          </div>
     </div>
</div>

<div id="CaseStatusForm" class="center row">
     <div class="col-xl-12 col-lg-12">
          <div class="card shadow mb-4">
               <!-- Card Header - Dropdown -->
               <div class="card-header py-3 d-flex flex-row align-items-center justify-content-between">
                    <h6 id="HeaderCaseStatusForm" class="m-0 font-weight-bold text-primary"></h6>
               </div>
               <div class="card-body">
                    <form class="user" method="post" autocomplete="off">
                         <div class="form-group row m-1 pb-4">
                              <div class="col-sm-2">
                                   <span class="text-info"> Name(EN) </span>
                                   <input type="text" class="form-control" id="NameEN">
                              </div>
                              <div class="col-sm-2">
                                   <span class="text-info"> Name(TH) </span>
     
                                   <input type="text" class="form-control" id="NameTH">
                              </div>
                              <div class="col-sm-2">
                                   <span class="text-info"> Status </span>
                                   <input type="text" class="form-control" id="Status">
                              </div>
                              <div class="col-sm-6">
                                   <span class="text-info"> Description </span>
                                   <input type="text" class="form-control" id="Description">
                              </div>
                         </div>
                         <div class="form-group row float-right">
                              <div class="col-sm-6" id="AddCaseStatus">
                                   <input class="btn btn-success btn-user btn-block" value="บันทึก" readonly="">
                              </div>
                              <div class="col-sm-6" id="EditCaseStatus">
                                   <input class="btn btn-success btn-user btn-block" value="แก้ไข" readonly="">
                              </div>
                              <div class="col-sm-6">
                                   <input type="reset" class="btn btn-danger btn-user btn-block" id="BackCaseStatusForm"
                                        value="ยกเลิก" readonly="">
                              </div>
                         </div>

                         <input type="hidden" id="HosID">
                         <input type="hidden" id="CaseStatusNameEN">
                         <input type="hidden" id="CaseStatusNameTH">
                         <input type="hidden" id="CaseStatusID">
                         <input type="hidden" id="CaseStatusDescription">
                         <input type="hidden" id="CaseStatusRecord">
                         <input type="hidden" id="CaseStatusGeneralStatusID">
                         <input type="hidden" id="TotalCaseStatus">
                    </form>
               </div>
          </div>
     </div>
</div>
