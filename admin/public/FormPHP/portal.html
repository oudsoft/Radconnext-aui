<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <link href="icon.png" rel="shortcut icon" type="image/x-icon" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RadConnextWeb Application</title>
    <style>
        button {
            margin-left :1rem; 
        }
    </style>
    <script>
        
    </script>
</head>

<body class="bg-gradient-primary">

    <div class="container">
        <!-- Outer Row -->
        <div class="row justify-content-center">
            <div class="col-lg-12">
                <div class="card o-hidden border-0 shadow-lg my-5">
                    <div class="card-body p-0">
                        <!-- Nested Row within Card Body -->
                        <div class="row">
                            <!--div class="col-lg-6 d-none d-lg-block bg-login-image"></div-->
                            <div class="col-lg-12">
                                <div class="p-5">
                                    <div class="text-center">
                                        <h1 class="h4 text-gray-900 mb-4">Welcome To Radconnext Portal</h1>
                                    </div>
                                    <form class="user">
                                        <div class="form-group row">
                                            <label for="IDCard" class="col-sm-2 col-form-label">เลขบัตรประชาชน</label>
                                            <input type="text" class="form-control form-control-user col-sm-2"
                                                id="pUserName" placeholder="เลขบัตรประชาชน">
                                        </div>
                                        <div class="form-group row">
                                            <label for="IDCard" class="col-sm-2 col-form-label">รหัสเคส</label>
                                            <input type="text" class="form-control form-control-user col-sm-2"
                                                id="pUserName" placeholder="รหัสเคส">
                                        </div>
                                        <div class="form-group row">
                                            <label for="IDCard" class="col-sm-2 col-form-label">OTP</label>
                                            <input type="text" class="form-control form-control-user col-sm-2"
                                                id="pUserName" placeholder="เลขบัตรประชาชน">
                                            <button class="btn btn-sm btn-primary" style="" >ขอOTP</button>
                                        </div>
                                    </form>
                                    <hr>
                                    <div class="form-group row">
                                        <div class='col-sm-3'>
                                            <button class="btn btn-sm btn-primary w-100">เปิดภาพ</button>
                                        </div>
                                        <div class='col-sm-3'>
                                            <button class="btn btn-sm btn-danger w-100">ติดต่อผู้ป่วย/ศูนย์เจ้าของภาพ</button>
                                        </div>
                                        <div class='col-sm-3'>
                                            <button class="btn btn-sm btn-warning w-100">แก้ไขOTP</button>
                                        </div>
                                        <div class='col-sm-3'>
                                            <button class="btn btn-sm btn-success w-100">Import</button>
                                        </div>

                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>

    </div>


</body>

</html>
